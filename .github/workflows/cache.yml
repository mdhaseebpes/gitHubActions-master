name: Deploy Project
on:
  #push
   workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: get the code
        uses: actions/checkout@v5
      - name: Install the node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Run tests
        run: npm test
  deploy:
    needs:  test
    runs-on: ubuntu-latest
    steps:
      - name: get the code
        uses: actions/checkout@v5
      - name: Install the node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build the project
        run:  npm run build
      - name: Deploy
        run:  echo "Deploying ..."