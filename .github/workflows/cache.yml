name: Deploy Project
on: [push,workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: get the code
        uses: actions/checkout@v5
      - name: Install the node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: cache dependencies
        uses: actions/checkout@v6
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hasFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
  deploy:
    needs:  test
    runs-on: ubuntu-latest
    steps:
      - name: get the code
        uses: actions/checkout@v5
      - name: Install the node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: cache dependencies
        uses: actions/checkout@v6
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hasFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Build the project
        run:  npm run build
      - name: Deploy
        run:  echo "Deploying ..."